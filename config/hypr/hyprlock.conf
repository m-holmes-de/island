# Rose Pine lock screen

background {
    monitor =
    blur_passes = 3
    blur_size = 8
    noise = 0.01
    contrast = 0.9
    brightness = 0.8
}

input-field {
    monitor =
    size = 300, 50
    outline_thickness = 3
    dots_size = 0.25
    dots_spacing = 0.2
    dots_center = true
    outer_color = rgb(31748f)
    inner_color = rgb(191724)
    font_color = rgb(e0def4)
    fade_on_empty = true
    placeholder_text = <span foreground="##908caa">Password...</span>
    hide_input = false
    rounding = 8
    position = 0, -20
    halign = center
    valign = center
}

label {
    monitor =
    text = $TIME
    color = rgb(e0def4)
    font_size = 64
    font_family = JetBrains Mono Nerd Font
    position = 0, 80
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:3600000] date +"%A, %B %d"
    color = rgb(908caa)
    font_size = 20
    font_family = JetBrains Mono Nerd Font
    position = 0, 160
    halign = center
    valign = center
}
